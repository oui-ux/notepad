<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Info & Concern Log</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topBar">
      <div>
        <h1>User Info & Issue / Concern Log</h1>
        <div class="topActions" style="margin-left:auto;">
          <button id="btnAddEntry">+ Add Entry</button>
          <button id="btnUndoRemove" class="secondary" style="display:none;">Undo Remove</button>
          <button id="btnCollapseAll" class="secondary">Collapse All</button>
          <button id="btnExpandAll" class="secondary">Expand All</button>
        </div>

    <label class="darkModeToggle fixed">
      <input type="checkbox" id="darkModeToggle" />
      <span class="slider">
        <span class="icon sun" title="Light mode">☀️</span>
        <span class="icon moon" title="Dark mode">🌙</span>
      </span>
    </label>
      </div>
    </header>

    <main class="page">
      <div id="entries" class="entries"></div>
    </main>

    <template id="entryTemplate">
      <article class="entry">

        <div class="entryHeader">
          <span class="badge">
            Entry <span class="entryNumber"></span>
            <input class="headerText1" type="text" placeholder="Phone #" style="margin-left:10px;width:120px;" />
            <input class="headerText2" type="text" placeholder="IMS" style="margin-left:5px;width:120px;" />
            <input class="headerText2" type="text" placeholder="INC" style="margin-left:5px;width:120px;" />
          </span>
          </span>
          <div>
            <button class="secondary" data-action="toggle">Collapse</button>
            <button class="danger" data-action="remove">Remove</button>
          </div>
        </div>

        <div class="entryBody">
          <!-- LEFT -->
          <section class="card">
            <h2>User Information</h2>

            <label>Root Cause</label>
            <input class="rootCauseInfo" />
            <label>Time Zone</label>
            <input class="timezone" />
            <label>Business Hours</label>
            <input class="businessHours" />
            <label>Best Contact Number</label>
            <input class="bestContactNumber" />
            <label>Alternate Contact Number</label>
            <input class="alternateContactNumber" />

            <div class="btnRow">
              <button data-action="display">Display User Info</button>
              <button class="secondary" data-action="copy">Copy</button>
            </div>
            <pre class="output userOutput"></pre>
          </section>

          <section class="card">
            <h2>Issue / Concern</h2>

            <button class="secondary" data-action="toggle-free-text" id="toggleFreeText">Show Free Text</button>

            <div class="freeTextDetails" style="display:none;">
              <div class="btnRow">
                <label>Select:</label>
                <select class="tabSelect" style="width:auto;margin-left:10px;">
                  <option value="troubleshooting">Troubleshooting Steps</option>
                  <option value="escalation">Escalation</option>
                </select>
              </div>

              <div class="troubleshootingContent">
                <div class="btnRow">
                  <button class="secondary" data-action="copy-troubleshooting">Copy</button>
                </div>
                <textarea class="issueText" style="width:100%;min-height:300px;resize:vertical;" placeholder="Troubleshooting Steps:">

Troubleshooting Steps:


Remote Session Permission: Yes
Sensitive/Confidential Statement Provided: Yes
Remote Session Completed: Yes
Issue Resolved: Yes
User Confirmed Resolution: Yes
Permission to Close Ticket: Yes</textarea>
            </div>

            <div class="escalationContent" style="display:none;">
              <div class="btnRow">
                <button class="secondary" data-action="copy-escalation">Copy</button>
              </div>
              <textarea class="escalationText" style="width:100%;min-height:300px;resize:vertical;" placeholder="Issue (I) - &#10;Error Message (E) - &#10;Cause (C) - &#10;Troubleshooting Steps:&#10;&#10;&#10;Bug Number (BN) - &#10;System Info (SI) -"></textarea>
            </div>
            </div>

            <div class="concernDetails">
              <label>Concern Type</label>
              <select class="concernType">
                <option value="">-- Select --</option>
                <option value="ios_passkey">iOS Passkey</option>
                <option value="android_passkey">Android Passkey </option>
                <option value="windows_passkey">Windows Passkey </option>
                <option value="iOS_new"> iOS new </option>
                <option value="android_new"> Android new </option>
                <option value="windows_deviceCompliance_update"> Windows device compliance(updates)</option>
                <option value="bitlock"> Bitlock</option>
                <option value="windows_deviceCompliance_sync"> Windows device compliance(sync)</option>
                <option value="identity_pass"> Identity pass</option>
                <option value="RAS_access"> RAS access</option>
                <option value="SAW"> SAW</option>
                <option value="windows_Activation"> Windows Activation</option>
                <option value="AzureVPN_taskbar"> Azure VPN taskbar</option>
                <option value="Deleted_device"> Windows Deleted Device</option>
                <option value="valid_phones"> Valid phones</option>

              </select>

              <div class="btnRow">
                <button data-action="steps">Show Steps</button>
              </div>

              <div class="splitOutputs">
              <div class="splitBlock">
                <div class="btnRow">
                  <label class="miniLabel">Short Description</label>
                  <button class="secondary" data-action="copy-usercalling">Copy</button>
                </div>
                <textarea class="outputBox userCallingOutput" readonly></textarea>
              </div>

              <div class="splitBlock">
                <div class="btnRow">
                  <label class="miniLabel">Root cause</label>
                  <button class="secondary" data-action="copy-rootcause">Copy</button>
                </div>
                <textarea class="outputBox rootCauseOutput" readonly></textarea>
              </div>

              <div class="splitBlock">
                <div class="btnRow">
                  <label class="miniLabel">Troubleshooting steps</label>
                  <button class="secondary" data-action="copy-troubleshooting">Copy</button>
                </div>
                <textarea class="outputBox troubleshootingOutput" readonly></textarea>
              </div>

              <div class="splitBlock">
                <div class="btnRow">
                  <label class="miniLabel">KB</label>
                  <button class="secondary" data-action="copy-kb">Copy</button>
                </div>
                <textarea class="outputBox kbOutput" readonly></textarea>
              </div>
            </div>
            </div>

            
            <pre class="output concernOutput" style="display:none;"></pre>
          </section>
        </div>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
